
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>GRIDLOCK - ACM SIGCHI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#00E5FF", 
              secondary: "#FF1744",
              accent: "#FF9100",
              "background-light": "#0B0F1A",
              "background-dark": "#05070D",
              "surface-dark": "#161B2E",
            },
            fontFamily: {
              display: ['Orbitron', 'sans-serif'],
              body: ['Rajdhani', 'sans-serif'],
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glitch': 'glitch 1s infinite linear alternate-reverse',
            },
            keyframes: {
              glitch: {
                '0%': { transform: 'translate(0)' },
                '20%': { transform: 'translate(-2px, 2px)' },
                '40%': { transform: 'translate(-2px, -2px)' },
                '60%': { transform: 'translate(2px, 2px)' },
                '80%': { transform: 'translate(2px, -2px)' },
                '100%': { transform: 'translate(0)' },
              }
            }
          },
        },
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        background-color: #05070D;
        color: #EAEAEA;
        overflow-x: hidden;
      }
      .text-glow-blue {
        text-shadow: 0 0 10px rgba(0, 229, 255, 0.7);
      }
      .text-glow-red {
        text-shadow: 0 0 15px rgba(255, 23, 68, 0.6);
      }
      .crack-effect {
        box-shadow: 0 0 15px #FF9100, 0 0 30px rgba(255, 145, 0, 0.4);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #0B0F1A;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #00E5FF;
        border-radius: 10px;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",

    "react": "https://esm.sh/react@^19.2.4",

  }
}
</script>

</head>

</html>
